<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Finder - Movie Night</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link href="mystyle.css" rel="stylesheet">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg glass-navbar">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html" style="color:#ffcc00;">Movie Night</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
         <li class="nav-item"><a class="nav-link" href="page-1.html">Discover</a></li>
          <li class="nav-item"><a class="nav-link" href="page-2.html">Shuffle</a></li>
          <li class="nav-item"><a class="nav-link" href="page-3.html">Movies</a></li>
          <li class="nav-item"><a class="nav-link" href="page-4.html">Contact Us</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main class="container">

  <section class="finder text-center">
    <h1>🎯 Find Your Movie</h1>
<p>Browse by genre and year to discover something new</p>

    <!-- FILTERS -->
    <div class="filters">

      <select id="genre" class="form-select mb-2">
  <option value="">Select Genre</option>
  <option value="28">Action</option>
  <option value="12">Adventure</option>
  <option value="16">Animation</option>
  <option value="35">Comedy</option>
  <option value="80">Crime</option>
  <option value="99">Documentary</option>
  <option value="18">Drama</option>
  <option value="10751">Family</option>
  <option value="14">Fantasy</option>
  <option value="36">History</option>
  <option value="27">Horror</option>
  <option value="10402">Music</option>
  <option value="9648">Mystery</option>
  <option value="10749">Romance</option>
  <option value="878">Sci-Fi</option>
  <option value="10770">TV Movie</option>
  <option value="53">Thriller</option>
  <option value="10752">War</option>
  <option value="37">Western</option>
</select>

      <select id="year" class="form-select mb-2">
        <option value="">Any Year</option>
      </select>

      <button id="searchBtn" class="mt-2">
        🔍 Find Movies
      </button>

    </div>

    <!-- RESULTS -->
    <div id="results" class="finder-results mt-4"></div>

  </section>

</main>

<!-- FOOTER -->
<footer class="glass-footer text-center">
  <div class="footer-content">
    <p class="mb-0">© 2026 Movie Night — Find your perfect movie 🍿</p>
  </div>
</footer>

<button id="backToTop" class="back-to-top">
  <i class="bi bi-arrow-up"></i>
</button>

<!-- MODAL -->
<div class="modal fade" id="movieModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle"></h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center">
        <img id="modalImg" class="img-fluid mb-3">
        <p id="modalYear"></p>
        <p id="modalRating"></p>
        <p id="modalDesc"></p>
      </div>

    </div>
  </div>
</div>

<!-- SCRIPTS -->
<script src="myscript.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
