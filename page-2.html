<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Random - Movie Night</title>

    <!-- Bootstrap core CSS -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom styles -->
    <link href="mystyle.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg glass-navbar">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html" style="color: #ffcc00;">Movie Night</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <ul class="navbar-nav">
           <li class="nav-item"><a class="nav-link" href="page-1.html">Discover</a></li>
          <li class="nav-item"><a class="nav-link" href="page-2.html">Shuffle</a></li>
          <li class="nav-item"><a class="nav-link" href="page-3.html">Movies</a></li>
          <li class="nav-item"><a class="nav-link" href="page-4.html">Contact Us</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="container random-page">

      <section class="random-hero text-center">
        <h1>🎲 Random</h1>
        <p>Pick your mood and let the app choose your next movie night</p>

        <!-- MODE TOGGLE -->
        <div class="random-mode-toggle text-center mb-3">
  <button id="modeRandom" class="mode-btn active">🎲 Random</button>
  <button id="modeMood" class="mode-btn">🎭 Mood Picks</button>
</div>

        <!-- RANDOM CONTROLS -->
        <div id="randomControls" class="random-controls">
          <select id="randomMood" class="form-select mb-2">
            <option value="">Choose Mood</option>
            <option value="sad">Sad</option>
            <option value="happy">Happy</option>
            <option value="bored">Bored</option>
            <option value="stressed">Stressed</option>
            <option value="romantic">Romantic</option>
            <option value="excited">Excited</option>
            <option value="tired">Tired</option>
          </select>

          <select id="randomGenre" class="form-select mb-2">
            <option value="">Any Genre</option>
            <option value="28">Action</option>
            <option value="12">Adventure</option>
            <option value="16">Animation</option>
            <option value="35">Comedy</option>
            <option value="80">Crime</option>
            <option value="18">Drama</option>
            <option value="10751">Family</option>
            <option value="14">Fantasy</option>
            <option value="27">Horror</option>
            <option value="9648">Mystery</option>
            <option value="10749">Romance</option>
            <option value="878">Sci-Fi</option>
            <option value="53">Thriller</option>
          </select>

          <button id="shuffleBtn" class="mt-2">🎬 Shuffle Movies</button>
        </div>

        <!-- MOOD QUICK PICKS -->
        <div id="moodRows" style="display:none;">
          <div class="alt-results">
            <button class="mood-quick-btn" data-genre="35">😂 Feel Good</button>
            <button class="mood-quick-btn" data-genre="18">💔 Emotional</button>
            <button class="mood-quick-btn" data-genre="10751">🍿 Easy Watch</button>
            <button class="mood-quick-btn" data-genre="28">🔥 Action Night</button>
            <button class="mood-quick-btn" data-genre="10749">💕 Romantic</button>
            <button class="mood-quick-btn" data-genre="878">🚀 Sci-Fi Escape</button>
          </div>
        </div>
      </section>

      <h3 class="random-screen-title">Tonight's Pick</h3>

      <section class="cinema-stage-section">
        <div class="cinema-stage">
          <div class="cinema-screen-shell">
            <div class="screen-label">Just for you</div>

            <div id="screenResult" class="cinema-screen">
              <div class="screen-placeholder">
                <i class="bi bi-film"></i>
                <p>Your random movie will appear here</p>
              </div>
            </div>
          </div>
        </div>

        <div class="shuffle-actions text-center">
          <button id="reshuffleBtn" class="mt-3" style="display:none;">
            🔄 Shuffle Again
          </button>
        </div>

        <div class="supporting-title text-center" id="altTitle" style="display:none;">
          <h3>Also try</h3>
        </div>

        <div id="altResults" class="alt-results"></div>
      </section>

    </main>

    <!-- FOOTER -->
    <footer class="glass-footer text-center">
      <div class="footer-content">
        <p class="mb-0">© 2026 Movie Night — Find your perfect movie 🍿</p>
      </div>
    </footer>

    <!-- BACK TO TOP -->
    <button id="backToTop" class="back-to-top">↑</button>

    <!-- RANDOM MODAL -->
    <div class="modal fade" id="randomMovieModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="randomModalTitle"></h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body text-center">
            <img id="randomModalImg" class="img-fluid mb-3" alt="">
            <p id="randomModalYear"></p>
            <p id="randomModalRating"></p>
            <p id="randomModalDesc"></p>

            <div id="randomTrailerWrap" style="display:none; margin-top: 10px;">
              <a id="randomTrailerBtn" class="screen-btn" target="_blank">
                ▶ Watch Trailer
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- SCRIPTS -->
    <script src="myscript.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
  </body>
</html>
