<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Movie Night - Find your perfect movie">
  <title>Movie Night</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="mystyle.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg glass-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html" style="color:#ffcc00;">Movie Night</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="page-1.html">Discover</a></li>
          <li class="nav-item"><a class="nav-link" href="page-2.html">Shuffle</a></li>
          <li class="nav-item"><a class="nav-link" href="page-3.html">Movies</a></li>
          <li class="nav-item"><a class="nav-link" href="page-4.html">Contact Us</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="page contact-page">

    <section class="hero small-hero">
      <div class="hero-content">
        <h1>Contact Us</h1>
        <p>Got a question, suggestion, or movie idea? Reach out 🎬</p>
      </div>
    </section>

    <section class="contact-container">
      <div class="contact-card">
        <h2>We would love to hear from you</h2>

        <form id="contactForm" action="https://api.web3forms.com/submit" method="POST">
          <input type="hidden" name="access_key" value="69c12f16-0ca1-4705-9626-2fcdbf123b65">

          <div class="form-group">
            <input type="text" name="name" placeholder="👤 Your Name" required>
          </div>

          <div class="form-group">
            <input type="email" name="email" placeholder="📧 Your Email" required>
          </div>

          <div class="form-group">
            <select name="subject" required>
              <option value="">Select a topic</option>
              <option value="General Question">General Question</option>
              <option value="Movie Suggestion">Movie Suggestion</option>
              <option value="Bug / Issue">Bug / Issue</option>
              <option value="Feedback">Feedback</option>
            </select>
          </div>

          <div class="form-group">
            <input type="text" name="movie" placeholder="🎬 Suggested Movie (optional)">
          </div>

          <div class="form-group">
            <textarea name="message" rows="4" placeholder="✉️ Your Message" required></textarea>
          </div>

          <button type="submit" class="contact-btn">Send Message</button>

          <p id="formMessage"></p>
        </form>
      </div>
    </section>

  </main>

  <footer class="glass-footer text-center">
    <div class="footer-content">
      <p class="mb-0">© 2026 Movie Night — Find your perfect movie 🍿</p>
    </div>
  </footer>

  <script src="myscript.js"></script>
  <script src="js/bootstrap.bundle.min.js"></script>

</body>
</html>
